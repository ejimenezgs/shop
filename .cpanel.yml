---
deployment:
  tasks:
    - export DEPLOYPATH=/home/gyu5la0fbzjq/public_html/panel.casaglick.com/

    - /bin/mkdir -p $DEPLOYPATH

    - /bin/rm -rf ${DEPLOYPATH}/assets
    - /bin/rm -rf ${DEPLOYPATH}/css
    - /bin/rm -rf ${DEPLOYPATH}/js

    - /bin/rm -f ${DEPLOYPATH}/*.js
    - /bin/rm -f ${DEPLOYPATH}/*.css

    - /bin/cp -R assets $DEPLOYPATH
    - /bin/cp -R css $DEPLOYPATH
    - /bin/cp -R js $DEPLOYPATH

    - /bin/cp index.html $DEPLOYPATH
    - if [ -f 404.html ]; then /bin/cp 404.html $DEPLOYPATH; fi
